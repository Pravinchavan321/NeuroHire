<!doctype html>
<html>
  <body style="margin:0;background:#f1f5f9;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #e2e8f0;">
            <tr>
              <td style="background:#111827;color:#ffffff;padding:24px 28px;font-size:24px;font-weight:800;letter-spacing:.02em;">
                NeuroHire
              </td>
            </tr>
            <tr>
              <td style="padding:30px 28px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.6;">Hi {{candidateName}},</p>
                <h1 style="margin:0 0 12px;font-size:26px;line-height:1.25;color:#0f172a;">Application status: {{status}}</h1>
                <p style="margin:0 0 12px;font-size:16px;line-height:1.6;color:#334155;">{{statusMessage}}</p>
                <p style="margin:0;font-size:16px;line-height:1.6;color:#334155;">Role: <strong>{{jobTitle}}</strong></p>
                {{recruiterNote}}
              </td>
            </tr>
            <tr>
              <td style="padding:20px 28px;background:#f8fafc;color:#64748b;font-size:12px;line-height:1.6;">
                Sent by {{footerName}}. You are receiving this message because you applied for a role through NeuroHire. To update email preferences, contact the recruiting team.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
