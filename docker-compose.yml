services:
  nginx:
    image: nginx:alpine
    ports: ["3000:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [frontend, backend]

  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:3000/api

  backend:
    build: ./backend
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/neurohire
      - PG_HOST=postgres
      - PG_USER=admin
      - PG_PASSWORD=secret
      - PG_DB=neurohire
      - JWT_SECRET=neurohire_secret_key
      - AI_SERVICE_URL=http://ai-service:8000
    volumes: ["uploads:/app/uploads"]
    depends_on: [mongo, postgres, ai-service]

  ai-service:
    build: ./ai-service
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MONGO_URI=mongodb://mongo:27017/neurohire
      - PG_HOST=postgres
      - PG_USER=admin
      - PG_PASSWORD=secret
      - PG_DB=neurohire
    volumes: ["uploads:/app/uploads"]
    depends_on: [postgres]

  mongo:
    image: mongo:7
    volumes: ["mongo_data:/data/db"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: neurohire
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mongo_data:
  pg_data:
  uploads:
